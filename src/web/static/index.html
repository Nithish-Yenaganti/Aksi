<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aksi Cognitive Map</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script defer src="/static/script.js"></script>
    <style>
      :root {
        --ink: #202124;
        --muted: #68707d;
        --line: #d8dde6;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --folder: #e9b44c;
        --file: #4f8f7a;
        --function: #8792d6;
        --class: #c58e67;
        --edge: #d95040;
        --stale: #bd3d32;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        color: var(--ink);
        background: var(--bg);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .layout {
        display: grid;
        grid-template-columns: 330px minmax(0, 1fr);
        height: 100vh;
      }

      aside {
        border-right: 1px solid var(--line);
        background: var(--panel);
        padding: 18px;
        overflow: auto;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0;
      }

      #root {
        color: var(--muted);
        font-size: 13px;
        word-break: break-word;
      }

      #detail {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
        font-size: 13px;
        line-height: 1.45;
        word-break: break-word;
      }

      .panel-block {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .query-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      input {
        width: 100%;
        min-width: 0;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        color: var(--ink);
        background: #fbfcfd;
        font: inherit;
      }

      .text-button {
        width: auto;
        min-width: 72px;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 650;
      }

      #answer,
      #results {
        margin-top: 10px;
        font-size: 13px;
        line-height: 1.45;
      }

      .result-item {
        display: block;
        width: 100%;
        height: auto;
        margin-top: 8px;
        padding: 8px;
        text-align: left;
        font-size: 12px;
        line-height: 1.35;
      }

      main {
        position: relative;
        min-width: 0;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .toolbar {
        position: absolute;
        top: 14px;
        right: 14px;
        display: flex;
        gap: 8px;
        z-index: 3;
      }

      button {
        width: 38px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        cursor: pointer;
        font-size: 17px;
      }

      .node rect {
        stroke: rgba(32, 33, 36, 0.25);
        stroke-width: 1;
        vector-effect: non-scaling-stroke;
        cursor: pointer;
      }

      .node circle {
        stroke: rgba(32, 33, 36, 0.28);
        stroke-width: 1.4;
        vector-effect: non-scaling-stroke;
        cursor: pointer;
      }

      .node text {
        pointer-events: none;
        fill: var(--ink);
        font-size: 12px;
        font-weight: 650;
      }

      .node.active circle {
        stroke: #111827;
        stroke-width: 2.6;
      }

      .node.dim {
        opacity: 0.24;
      }

      .edge {
        fill: none;
        stroke: var(--edge);
        stroke-width: 1.8;
        stroke-opacity: 0.58;
        vector-effect: non-scaling-stroke;
      }

      .edge.dim {
        stroke-opacity: 0.08;
      }

      .tree-link {
        fill: none;
        stroke: #b8c0cc;
        stroke-width: 1.4;
        stroke-opacity: 0.75;
        vector-effect: non-scaling-stroke;
      }

      .tree-link.dim {
        stroke-opacity: 0.12;
      }

      code {
        color: #36564e;
      }

      @media (max-width: 760px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: 310px minmax(0, 1fr);
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <h1>Aksi Map</h1>
        <div id="root">Loading graph</div>
        <section class="panel-block">
          <form id="chatForm" class="query-row">
            <input id="chatInput" type="search" autocomplete="off" placeholder="Ask or search the map">
            <button class="text-button" type="submit">Ask</button>
          </form>
          <div id="answer"></div>
          <div id="results"></div>
        </section>
        <section id="detail">Select a node to inspect it.</section>
      </aside>
      <main>
        <div class="toolbar">
          <button id="zoomOut" title="Zoom out">-</button>
          <button id="zoomReset" title="Reset zoom">0</button>
          <button id="zoomIn" title="Zoom in">+</button>
        </div>
        <svg id="map" aria-label="Aksi zoomable code map"></svg>
      </main>
    </div>
  </body>
</html>
