<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aksi - Blueprint</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #064f85;
      --blueprint: #0a5f99;
      --blueprint-dark: #043f6d;
      --blueprint-deep: #032f55;
      --paper-line: rgba(240, 250, 255, 0.84);
      --ink: #edf9ff;
      --muted: #b9dceb;
      --line: rgba(240, 250, 255, 0.78);
      --stale: #f6d46b;
      --unused: #ff8f7d;
      --file: rgba(5, 76, 126, 0.88);
      --folder: rgba(7, 91, 150, 0.9);
      --symbol: rgba(4, 57, 98, 0.92);
      --external: rgba(3, 47, 85, 0.86);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background:
        linear-gradient(rgba(237, 249, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(237, 249, 255, 0.055) 1px, transparent 1px),
        linear-gradient(rgba(237, 249, 255, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(237, 249, 255, 0.12) 1px, transparent 1px),
        radial-gradient(circle at 24% 18%, rgba(237, 249, 255, 0.11), transparent 32%),
        radial-gradient(circle at 84% 78%, rgba(3, 47, 85, 0.26), transparent 36%),
        linear-gradient(145deg, var(--blueprint) 0%, var(--blueprint-dark) 54%, var(--blueprint-deep) 100%);
      background-size:
        24px 24px,
        24px 24px,
        120px 120px,
        120px 120px,
        auto,
        auto,
        auto;
      color: var(--ink);
      font: 16px/1.35 "Courier New", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 24px;
      z-index: 0;
      pointer-events: none;
      border: 2px solid rgba(240, 250, 255, 0.72);
      box-shadow:
        inset 0 0 0 1px rgba(240, 250, 255, 0.2),
        0 0 44px rgba(3, 47, 85, 0.5);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        radial-gradient(circle at 16px 18px, rgba(255, 255, 255, 0.8) 0 0.8px, transparent 1px),
        radial-gradient(circle at 74px 64px, rgba(255, 255, 255, 0.45) 0 0.7px, transparent 1px);
      background-size: 96px 96px, 132px 132px;
      mix-blend-mode: screen;
    }

    #toolbar {
      position: fixed;
      inset: 12px 12px auto 12px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    #toolbar > div {
      min-width: 0;
      padding: 10px 12px;
      border: 1.5px solid rgba(240, 250, 255, 0.66);
      border-radius: 0;
      background: rgba(4, 63, 109, 0.78);
      box-shadow:
        inset 0 0 0 1px rgba(240, 250, 255, 0.12),
        0 10px 24px rgba(3, 47, 85, 0.36);
      pointer-events: auto;
    }

    #toolName {
      font-weight: 700;
      letter-spacing: 0.06em;
      white-space: nowrap;
      text-transform: uppercase;
    }

    #repoName {
      max-width: min(420px, calc(100vw - 180px));
      color: var(--muted);
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #meta {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 3;
      max-width: min(760px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1.5px solid rgba(240, 250, 255, 0.58);
      border-radius: 0;
      background: rgba(4, 63, 109, 0.78);
      box-shadow: inset 0 0 0 1px rgba(240, 250, 255, 0.1), 0 10px 24px rgba(3, 47, 85, 0.36);
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #viewModes {
      display: flex;
      gap: 4px;
      padding: 4px;
    }

    #viewModes button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      padding: 6px 9px;
    }

    #viewModes button.active {
      border-color: rgba(240, 250, 255, 0.72);
      background: rgba(237, 249, 255, 0.12);
      color: var(--ink);
    }

    #details {
      display: none;
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 3;
      width: min(380px, calc(100vw - 24px));
      max-height: 45vh;
      overflow: auto;
      padding: 12px;
      border: 1.5px solid rgba(240, 250, 255, 0.66);
      border-radius: 0;
      background: rgba(3, 47, 85, 0.9);
      box-shadow: inset 0 0 0 1px rgba(240, 250, 255, 0.1), 0 12px 32px rgba(3, 47, 85, 0.52);
    }

    #details.open {
      display: block;
    }

    #details h2 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    #details h3 {
      margin: 12px 0 4px;
      color: var(--ink);
      font-size: 11px;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    #details p {
      margin: 4px 0;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    svg {
      width: 100vw;
      height: 100vh;
      display: block;
      position: relative;
      z-index: 1;
    }

    .node rect {
      stroke: var(--paper-line);
      stroke-width: 1.35;
      fill-opacity: 0.82;
      cursor: pointer;
      filter: drop-shadow(0 0 2px rgba(240, 250, 255, 0.32));
    }

    .node.repo rect { fill: rgba(7, 91, 150, 0.7); stroke: #f0faff; stroke-width: 2; }
    .node.folder rect { fill: var(--folder); }
    .node.file rect { fill: var(--file); }
    .node.function rect,
    .node.class rect,
    .node.interface rect,
    .node.struct rect,
    .node.type rect { fill: var(--symbol); }
    .node.external rect { fill: var(--external); stroke-dasharray: 4 3; }
    .node.component rect { fill: rgba(8, 100, 161, 0.72); stroke: #f0faff; }
    .node.input rect { fill: rgba(7, 91, 150, 0.74); stroke: #f0faff; }
    .node.process rect { fill: rgba(4, 63, 109, 0.8); stroke: #d8f2fa; }
    .node.artifact rect { fill: rgba(8, 100, 161, 0.72); stroke: #f0faff; }
    .node.consumer rect { fill: rgba(11, 113, 177, 0.72); stroke: #f0faff; }
    .node.stale rect { stroke: var(--stale); stroke-width: 2.5; }
    .node.unused rect {
      stroke: var(--unused);
      stroke-width: 2.8;
      stroke-dasharray: 8 4;
      fill: rgba(92, 38, 44, 0.76);
    }
    .node.selected rect { stroke: #ffffff; stroke-width: 3; }
    .node.connected rect { stroke: #d2ecf2; stroke-width: 2.5; }

    .label {
      fill: var(--ink);
      pointer-events: none;
      text-anchor: middle;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .kind-label {
      fill: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .name-label {
      dominant-baseline: middle;
    }

    .edge {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.35;
      stroke-opacity: 0.72;
      pointer-events: none;
    }

    .edge.hierarchy { stroke: #f0faff; stroke-opacity: 0.62; stroke-width: 1.5; }
    .edge.import {
      marker-end: url(#arrow-flow);
      stroke: #f0faff;
      stroke-opacity: 0.58;
      stroke-width: 1.5;
    }

    .edge.active {
      stroke: #ffffff;
      stroke-width: 3;
      stroke-opacity: 0.95;
    }

    body[data-view="structure"] .import-edges { display: none; }
    body[data-view="architecture"] .hierarchy-edges { display: none; }
    body[data-view="architecture"] .edge.import { stroke-opacity: 0.82; stroke-width: 2.2; }
    body[data-view="runtime"] .hierarchy-edges { display: none; }
    body[data-view="runtime"] .edge.import { stroke-opacity: 0.9; stroke-width: 2.4; }
  </style>
</head>
<body>
  <div id="toolbar">
    <div id="toolName">Aksi Blueprint</div>
    <div id="viewModes" aria-label="Map view mode">
      <button type="button" data-view="structure" class="active">Structure</button>
      <button type="button" data-view="architecture">Architecture</button>
      <button type="button" data-view="runtime">Runtime Flow</button>
    </div>
    <div id="repoName">Loading repo</div>
  </div>
  <div id="meta">Loading architecture.json</div>
  <div id="details">
  </div>
  <svg id="canvas" role="img" aria-label="Aksi codebase map"></svg>

  <script>
    const svg = d3.select("#canvas");
    const defs = svg.append("defs");
    defs.append("marker")
      .attr("id", "arrow-flow")
      .attr("viewBox", "0 0 10 10")
      .attr("refX", 9)
      .attr("refY", 5)
      .attr("markerWidth", 7)
      .attr("markerHeight", 7)
      .attr("orient", "auto-start-reverse")
      .append("path")
      .attr("d", "M 0 0 L 10 5 L 0 10 z")
      .attr("fill", "#f0faff");

    const viewport = svg.append("g").attr("class", "viewport");
    const hierarchyEdgeLayer = viewport.append("g").attr("class", "hierarchy-edges");
    const importEdgeLayer = viewport.append("g").attr("class", "import-edges");
    const nodeLayer = viewport.append("g").attr("class", "nodes");
    const meta = document.querySelector("#meta");
    const repoName = document.querySelector("#repoName");
    const details = document.querySelector("#details");
    const modeButtons = Array.from(document.querySelectorAll("#viewModes button"));

    const width = () => window.innerWidth;
    const height = () => window.innerHeight;
    const viewportMargin = { top: 92, right: 32, bottom: 32, left: 32 };
    let zoomBehavior = null;
    let currentGraph = null;
    let currentView = "structure";
    let currentDiagramEdges = [];
    let selectedNodeId = null;
    let summaryIndex = {};
    let refinedModels = {};
    document.body.dataset.view = currentView;

    function nodeArray(graph) {
      return Object.values(graph.nodes || {});
    }

    function assertValidGraph(graph) {
      if (!graph || typeof graph !== "object" || !graph.nodes || !graph.root || !graph.nodes[graph.root]) {
        throw new Error("architecture.json is missing a valid root node");
      }
    }

    function buildHierarchy(graph) {
      const nodes = graph.nodes || {};
      const root = nodes[graph.root];
      return d3.hierarchy(root, node => (node.children || []).map(id => nodes[id]).filter(Boolean));
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function splitLongWord(word, limit) {
      const chunks = [];
      for (let index = 0; index < word.length; index += limit) {
        chunks.push(word.slice(index, index + limit));
      }
      return chunks;
    }

    function wrapLabel(text, limit = 28) {
      const words = String(text || "").split(/\s+/).flatMap(word => (
        word.length > limit ? splitLongWord(word, limit) : [word]
      ));
      const lines = [];
      let current = "";
      for (const word of words) {
        const next = current ? `${current} ${word}` : word;
        if (next.length > limit && current) {
          lines.push(current);
          current = word;
        } else {
          current = next;
        }
      }
      if (current) lines.push(current);
      return lines.length ? lines : [""];
    }

    function typeLabel(node) {
      const labels = {
        repo: "repo name",
        folder: "dir name",
        file: "file name",
        function: "func / method name",
        class: "class name",
        interface: "interface name",
        struct: "struct name",
        type: "type name",
        external: "external name",
        component: "architecture component",
        input: "input",
        process: "process",
        artifact: "artifact",
        consumer: "consumer",
      };
      return labels[node.type] || `${node.type || "node"} name`;
    }

    function measureNode(node) {
      const labelLimit = node.type === "function" || node.type === "class" ? 24 : 30;
      const lines = wrapLabel(node.name, labelLimit);
      const longest = Math.max(...lines.map(line => line.length), 8);
      node.labelLines = lines;
      node.kindLabel = typeLabel(node);
      node.boxWidth = clamp(longest * 9.2 + 44, 130, 360);
      node.boxHeight = clamp(lines.length * 22 + 52, 68, 198);
      return node;
    }

    function rightAnchor(node) {
      return [node.x + node.boxWidth / 2, node.y];
    }

    function leftAnchor(node) {
      return [node.x - node.boxWidth / 2, node.y];
    }

    function bottomAnchor(node) {
      return [node.x, node.y + node.boxHeight / 2];
    }

    function topAnchor(node) {
      return [node.x, node.y - node.boxHeight / 2];
    }

    function connector(source, target) {
      const [sx, sy] = source.y <= target.y ? bottomAnchor(source) : topAnchor(source);
      if (target.flowStack) {
        const [tx, ty] = source.x <= target.x ? leftAnchor(target) : rightAnchor(target);
        return `M${sx},${sy} L${sx},${ty} L${tx},${ty}`;
      }
      const [tx, ty] = source.y <= target.y ? topAnchor(target) : bottomAnchor(target);
      const midY = sy + (ty - sy) / 2;
      return `M${sx},${sy} L${sx},${midY} L${tx},${midY} L${tx},${ty}`;
    }

    function directionalAnchors(source, target) {
      const dx = target.x - source.x;
      const dy = target.y - source.y;
      if (Math.abs(dx) > Math.abs(dy)) {
        return dx >= 0
          ? [rightAnchor(source), leftAnchor(target)]
          : [leftAnchor(source), rightAnchor(target)];
      }
      return dy >= 0
        ? [bottomAnchor(source), topAnchor(target)]
        : [topAnchor(source), bottomAnchor(target)];
    }

    function flowConnector(source, target) {
      const [[sx, sy], [tx, ty]] = directionalAnchors(source, target);
      if (Math.abs(tx - sx) > Math.abs(ty - sy)) {
        const midX = sx + (tx - sx) / 2;
        return `M${sx},${sy} L${midX},${sy} L${midX},${ty} L${tx},${ty}`;
      }
      const midY = sy + (ty - sy) / 2;
      return `M${sx},${sy} L${sx},${midY} L${tx},${midY} L${tx},${ty}`;
    }

    function graphBounds(descendants) {
      return {
        minX: d3.min(descendants, item => item.data.x - item.data.boxWidth / 2) || 0,
        maxX: d3.max(descendants, item => item.data.x + item.data.boxWidth / 2) || width(),
        minY: d3.min(descendants, item => item.data.y - item.data.boxHeight / 2) || 0,
        maxY: d3.max(descendants, item => item.data.y + item.data.boxHeight / 2) || height(),
      };
    }

    function fitTransform(bounds) {
      const graphWidth = Math.max(1, bounds.maxX - bounds.minX);
      const graphHeight = Math.max(1, bounds.maxY - bounds.minY);
      const availableWidth = Math.max(1, width() - viewportMargin.left - viewportMargin.right);
      const availableHeight = Math.max(1, height() - viewportMargin.top - viewportMargin.bottom);
      const verticalScale = availableHeight / graphHeight;
      const softHorizontalScale = (availableWidth * 1.35) / graphWidth;
      const scale = clamp(Math.min(verticalScale, softHorizontalScale), 0.24, 1.45);
      const offsetX = viewportMargin.left + (availableWidth - graphWidth * scale) / 2 - bounds.minX * scale;
      const offsetY = viewportMargin.top + (availableHeight - graphHeight * scale) / 2 - bounds.minY * scale;
      return d3.zoomIdentity.translate(offsetX, offsetY).scale(scale);
    }

    function applyLevelRows(descendants) {
      const levelGap = 126;
      const rows = d3.group(descendants, item => item.depth);
      const rowHeights = new Map(
        Array.from(rows, ([depth, items]) => [depth, d3.max(items, item => item.data.boxHeight) || 58])
      );
      const maxDepth = d3.max(descendants, item => item.depth) || 0;
      let cursor = 24;
      for (let depth = 0; depth <= maxDepth; depth += 1) {
        const rowHeight = rowHeights.get(depth) || 58;
        const y = cursor + rowHeight / 2;
        (rows.get(depth) || []).forEach(item => {
          item.data.y = y;
        });
        cursor += rowHeight + levelGap;
      }
    }

    function compactHorizontalRows(root, descendants) {
      const rows = d3.group(descendants, item => item.depth);
      const rootCenter = root.data.x;

      for (const [depth, items] of rows) {
        if (depth === 0 || items.length < 2) continue;

        const gap = depth === 1 ? 14 : 8;
        const sorted = [...items].sort((a, b) => a.data.x - b.data.x);
        let cursor = sorted[0].data.x - sorted[0].data.boxWidth / 2;

        sorted.forEach(item => {
          const desiredLeft = item.data.x - item.data.boxWidth / 2;
          const left = Math.max(desiredLeft, cursor);
          item.data.x = left + item.data.boxWidth / 2;
          cursor = left + item.data.boxWidth + gap;
        });

        const leftEdge = sorted[0].data.x - sorted[0].data.boxWidth / 2;
        const rightEdge = sorted[sorted.length - 1].data.x + sorted[sorted.length - 1].data.boxWidth / 2;
        const rowCenter = leftEdge + (rightEdge - leftEdge) / 2;
        const shift = rootCenter - rowCenter;
        sorted.forEach(item => {
          item.data.x += shift;
        });
      }
    }

    function subtreeBottom(item) {
      const descendants = item.descendants();
      return d3.max(descendants, child => child.data.y + child.data.boxHeight / 2) || item.data.y;
    }

    function stackChildren(parent, rootCenter) {
      if (!parent.children || parent.children.length === 0) return;

      const shouldStack = parent.depth >= 1 && (parent.children.length > 2 || parent.depth >= 2);
      if (!shouldStack) {
        parent.children.forEach(child => stackChildren(child, rootCenter));
        return;
      }

      const side = parent.data.x <= rootCenter ? 1 : -1;
      const maxChildWidth = d3.max(parent.children, child => child.data.boxWidth) || 140;
      const columnX = parent.data.x + side * (parent.data.boxWidth / 2 + maxChildWidth / 2 + 34);
      let cursorY = parent.data.y + parent.data.boxHeight / 2 + 34;

      parent.children.forEach(child => {
        child.data.x = columnX;
        child.data.y = cursorY + child.data.boxHeight / 2;
        child.data.flowStack = true;
        stackChildren(child, rootCenter);
        cursorY = subtreeBottom(child) + 12;
      });
    }

    function annotateKindLabels(root) {
      root.each(item => {
        item.data.showKindLabel = true;
      });
    }

    function dependencyItems(graph, label) {
      const nodes = graph.nodes || {};
      const files = nodeArray(graph).filter(node => node.type === "file");
      const usedExternalIds = new Set((graph.edges || [])
        .filter(edge => nodes[edge.target]?.type === "external")
        .map(edge => edge.target));
      const externals = Array.from(usedExternalIds).map(id => nodes[id]).filter(Boolean);
      const items = [...files, ...externals].map(node => ({
        ...node,
        children: [],
        name: node.type === "file" ? node.path : node.name,
        kindLabel: node.type === "external" ? "external dependency" : label,
        showKindLabel: true,
      }));
      const itemIds = new Set(items.map(item => item.id));
      const edges = (graph.edges || []).filter(edge => itemIds.has(edge.source) && itemIds.has(edge.target));
      const levelById = new Map(items.map(item => [item.id, 0]));

      for (let pass = 0; pass < items.length; pass += 1) {
        let changed = false;
        for (const edge of edges) {
          const sourceLevel = levelById.get(edge.source) || 0;
          const targetLevel = levelById.get(edge.target) || 0;
          if (targetLevel <= sourceLevel) {
            levelById.set(edge.target, sourceLevel + 1);
            changed = true;
          }
        }
        if (!changed) break;
      }

      items.forEach(item => {
        item.level = clamp(levelById.get(item.id) || 0, 0, 8);
        measureNode(item);
      });
      return { items, edges };
    }

    function buildRuntimeFlow(graph) {
      const refined = buildRefinedModel("runtime", "runtime step");
      if (refined) return refined;
      return dependencyItems(graph, "runtime module");
    }

    function layoutRuntimeItems(items) {
      const levels = d3.group(items, item => item.level);
      const orderedLevels = Array.from(levels.keys()).sort((a, b) => a - b);
      const levelGap = 126;
      let cursorY = 24;

      orderedLevels.forEach(level => {
        const row = levels.get(level);
        const rowHeight = d3.max(row, item => item.boxHeight) || 68;
        let cursorX = 24;
        row.forEach(item => {
          item.x = cursorX + item.boxWidth / 2;
          item.y = cursorY + rowHeight / 2;
          cursorX += item.boxWidth + 24;
        });
        cursorY += rowHeight + levelGap;
      });
    }

    function buildArchitectureView(graph) {
      const refined = buildRefinedModel("architecture", "architecture component");
      if (refined) return refined;

      const components = (graph.components || []).map(component => ({
        ...component,
        children: [],
        kindLabel: "architecture component",
        showKindLabel: true,
      }));
      if (!components.length) {
        return dependencyItems(graph, "architecture module");
      }

      const componentIds = new Set(components.map(component => component.id));
      const edges = (graph.component_edges || []).filter(edge => componentIds.has(edge.source) && componentIds.has(edge.target));
      const levelById = new Map(components.map(component => [component.id, 0]));

      for (let pass = 0; pass < components.length; pass += 1) {
        let changed = false;
        for (const edge of edges) {
          const sourceLevel = levelById.get(edge.source) || 0;
          const targetLevel = levelById.get(edge.target) || 0;
          if (targetLevel <= sourceLevel) {
            levelById.set(edge.target, sourceLevel + 1);
            changed = true;
          }
        }
        if (!changed) break;
      }

      components.forEach(component => {
        component.level = clamp(levelById.get(component.id) || 0, 0, 8);
        measureNode(component);
      });
      return { items: components, edges };
    }

    function buildRefinedModel(modelType, kindLabel) {
      const model = refinedModels?.[modelType];
      if (!model || !Array.isArray(model.nodes) || !model.nodes.length) {
        return null;
      }
      const items = model.nodes.map(node => ({
        ...node,
        children: [],
        path: node.path || node.id,
        kindLabel: node.kindLabel || kindLabel,
        showKindLabel: true,
        detail: node.summary || node.detail,
      }));
      const ids = new Set(items.map(item => item.id));
      const edges = (model.edges || [])
        .filter(edge => ids.has(edge.source) && ids.has(edge.target))
        .map((edge, index) => ({
          ...edge,
          id: edge.id || `${modelType}-edge:${index + 1}`,
          type: edge.type || "host_refined",
          import_text: edge.label || edge.import_text || "host-refined relationship",
        }));
      const levelById = new Map(items.map(item => [item.id, 0]));
      for (let pass = 0; pass < items.length; pass += 1) {
        let changed = false;
        for (const edge of edges) {
          const sourceLevel = levelById.get(edge.source) || 0;
          const targetLevel = levelById.get(edge.target) || 0;
          if (targetLevel <= sourceLevel) {
            levelById.set(edge.target, sourceLevel + 1);
            changed = true;
          }
        }
        if (!changed) break;
      }
      items.forEach(item => {
        item.level = clamp(levelById.get(item.id) || 0, 0, 8);
        measureNode(item);
      });
      return { items, edges, refined: true, model };
    }

    function layoutArchitectureItems(items) {
      const levels = d3.group(items, item => item.level);
      const orderedLevels = Array.from(levels.keys()).sort((a, b) => a - b);
      const columnGap = 72;
      const rowGap = 18;
      let cursorX = 24;

      orderedLevels.forEach(level => {
        const column = [...levels.get(level)].sort((a, b) => a.id.localeCompare(b.id));
        const columnWidth = d3.max(column, item => item.boxWidth) || 140;
        let cursorY = 24;
        column.forEach(item => {
          item.x = cursorX + columnWidth / 2;
          item.y = cursorY + item.boxHeight / 2;
          cursorY += item.boxHeight + rowGap;
        });
        cursorX += columnWidth + columnGap;
      });
    }

    function describeStructureNode(node, incoming, outgoing) {
      const connected = incoming.length + outgoing.length;
      const base = {
        what: `${typeLabel(node)} in the generated repository map.`,
        why: "It gives the map a selectable unit so the UI and MCP host can explain this part of the codebase.",
        how: "Aksi creates this rectangle from the generated architecture JSON.",
        role: "It participates in the structure diagram and can be selected for context.",
      };

      if (node.type === "repo") {
        return {
          what: "The scanned repository root.",
          why: "It anchors the whole blueprint so every folder, file, and symbol has a single parent map.",
          how: "The graph builder creates it once from the repository path before adding discovered children.",
          role: "Top-level container for the complete codebase structure.",
        };
      }
      if (node.type === "folder") {
        return {
          what: `Directory named ${node.name}.`,
          why: "It groups related files and keeps the map aligned with the real filesystem.",
          how: "The graph builder derives it from file paths discovered by the scanner.",
          role: "Container that organizes child folders and files.",
        };
      }
      if (node.type === "file") {
        const deadNote = node.unused
          ? ` Aksi marked it as possibly unused because ${node.dead_reason || "no local usage was found."}`
          : "";
        return {
          what: `${node.language || "Source"} file named ${node.name}.`,
          why: `Files are the main rooms in the blueprint: they hold symbols and connect to other files through imports.${deadNote}`,
          how: "The scanner hashes this file, extracts symbols/imports, and the graph builder turns it into a file node.",
          role: `Source container with ${outgoing.length} outgoing and ${incoming.length} incoming relationship${connected === 1 ? "" : "s"}.`,
        };
      }
      if (["function", "class", "interface", "struct", "type"].includes(node.type)) {
        const deadNote = node.unused
          ? ` Aksi marked it as possibly unused because ${node.dead_reason || "no local references were found."}`
          : "";
        return {
          what: `${node.type} named ${node.name}.`,
          why: `Symbols show the useful internal parts of a file instead of treating code as one flat text blob.${deadNote}`,
          how: "Tree-sitter or the fallback parser found this symbol and recorded its line range.",
          role: `Code-level unit inside ${node.path || "its file"}${node.start_line ? ` at lines ${node.start_line}-${node.end_line}` : ""}.`,
        };
      }
      if (node.type === "external") {
        return {
          what: `External dependency or unresolved import named ${node.name}.`,
          why: "It shows when local code depends on something outside the scanned repository map.",
          how: "The graph builder creates this when an import cannot be resolved to a local file.",
          role: `Dependency endpoint with ${incoming.length} incoming reference${incoming.length === 1 ? "" : "s"}.`,
        };
      }
      return base;
    }

    function describeRuntimeNode(node, incoming, outgoing) {
      return {
        what: node.detail || `${node.name} participates in the scanned repository's import/runtime flow.`,
        why: "It appears here because static imports connect it to other files or external dependencies.",
        how: outgoing.length
          ? `It imports or references ${outgoing.length} downstream module${outgoing.length === 1 ? "" : "s"} in the scanned repo graph.`
          : "No downstream imports are visible from this node in the generated graph.",
        role: `Runtime-flow node with ${incoming.length} incoming and ${outgoing.length} outgoing connection${incoming.length + outgoing.length === 1 ? "" : "s"}.`,
      };
    }

    function describeArchitectureNode(node, incoming, outgoing) {
      if (node.type === "component") {
        const countText = `${node.file_count || 0} file${node.file_count === 1 ? "" : "s"}`;
        return {
          what: node.detail || `${node.name} is a project architecture component.`,
          why: node.why || "It groups source files by their role in the scanned project, not just by folder location.",
          how: node.how || "Aksi detected this component locally from file paths, names, symbols, and import relationships.",
          role: node.role || `Architecture component containing ${countText}, with ${incoming.length} incoming and ${outgoing.length} outgoing component relationship${incoming.length + outgoing.length === 1 ? "" : "s"}.`,
        };
      }
      return {
        what: node.detail || `${node.name} is a module in the scanned repository architecture.`,
        why: node.why || "It appears in the architecture view because it is a local source file or dependency endpoint.",
        how: node.how || "Aksi places it from static import relationships discovered in the scanned repository.",
        role: node.role || `Repository module with ${incoming.length} incoming and ${outgoing.length} outgoing dependency connection${incoming.length + outgoing.length === 1 ? "" : "s"}.`,
      };
    }

    function nodeSummary(node, incoming, outgoing) {
      const saved = summaryIndex[node.id];
      if (saved && saved.summary) {
        const summary = saved.summary;
        if (typeof summary === "string") {
          return {
            purpose: summary,
            behavior: saved.stale ? "This saved LLM summary may be stale because the source file changed." : "This was saved by the LLM host for reuse.",
            interfaces: "Unknown from string-only summary.",
            dependencies: "Unknown from string-only summary.",
            used_by: "Cached context for future questions about this rectangle.",
            change_risk: "unknown",
            open_questions: "Open source with get_context if this node is directly relevant to the task.",
            confidence: "unknown",
            source: saved.stale ? "Saved LLM summary (stale)" : "Saved LLM summary",
          };
        }
        return {
          purpose: summary.purpose || summary.summary || summary.what || "Saved LLM summary is available for this rectangle.",
          behavior: summary.behavior || summary.how_it_works || summary.how || "The LLM host produced this after reading exact code through Aksi MCP get_context.",
          interfaces: summary.interfaces || "Not specified in saved summary.",
          dependencies: summary.dependencies || summary.relationships || "Not specified in saved summary.",
          used_by: summary.used_by || summary.role || "Cached explanation for future LLM and user context.",
          change_risk: summary.change_risk || "unknown",
          open_questions: summary.open_questions || "None recorded.",
          confidence: summary.confidence || "unknown",
          source: saved.stale ? "Saved LLM summary (stale)" : "Saved LLM summary",
        };
      }
      if (node.purpose || node.behavior || node.summary || node.responsibility || node.how_it_works || node.relationships) {
        return {
          purpose: node.purpose || node.summary || node.detail || `${node.name} is part of the host-refined ${currentView} model.`,
          behavior: node.behavior || node.how_it_works || node.how || "The host LLM produced this model after reading Aksi context.",
          interfaces: node.interfaces || "Not specified in refined model.",
          dependencies: node.dependencies || node.relationships || `${incoming.length} incoming and ${outgoing.length} outgoing relationship${incoming.length + outgoing.length === 1 ? "" : "s"}.`,
          used_by: node.used_by || node.role || "Defined by the host-refined model.",
          change_risk: node.change_risk || "unknown",
          open_questions: node.open_questions || "None recorded.",
          confidence: node.confidence || "unknown",
          source: "Host-refined model",
        };
      }
      if (currentView === "architecture") {
        return { ...describeArchitectureNode(node, incoming, outgoing), source: "Local architecture summary" };
      }
      if (node.type === "repo" && currentGraph?.repo_summary) {
        return {
          what: currentGraph.repo_summary,
          why: "This gives a quick repo-level orientation before inspecting individual files and symbols.",
          how: "Aksi generated it from local scan counts, detected languages, symbols, and imports.",
          role: "Top-level overview for the scanned repository.",
          source: "Local repo summary",
        };
      }
      return currentView === "runtime"
        ? { ...describeRuntimeNode(node, incoming, outgoing), source: "Local fallback summary" }
        : { ...describeStructureNode(node, incoming, outgoing), source: "Local fallback summary" };
    }

    function updateDetails(node, graph) {
      const edges = currentDiagramEdges.filter(edge => edge.source === node.id || edge.target === node.id);
      const outgoing = currentDiagramEdges.filter(edge => edge.source === node.id);
      const incoming = currentDiagramEdges.filter(edge => edge.target === node.id);
      const summary = nodeSummary(node, incoming, outgoing);
      const meta = [
        node.type,
        node.language,
        node.stale ? "stale" : "",
        node.unused ? "possibly unused" : "",
        node.path,
      ].filter(Boolean).join(" · ");

      details.classList.add("open");
      details.innerHTML = [
        `<h2>${escapeHtml(node.name)}</h2>`,
        `<p>${escapeHtml(meta)}</p>`,
        `<p>${escapeHtml(summary.source)}</p>`,
        "<h3>Purpose</h3>",
        `<p>${escapeHtml(summary.purpose || summary.summary || summary.what)}</p>`,
        "<h3>Behavior</h3>",
        `<p>${escapeHtml(summary.behavior || summary.how_it_works || summary.how)}</p>`,
        "<h3>Interfaces</h3>",
        `<p>${escapeHtml(summary.interfaces || "Not specified.")}</p>`,
        "<h3>Dependencies</h3>",
        `<p>${escapeHtml(summary.dependencies || summary.relationships || summary.role || "Not specified.")}</p>`,
        "<h3>Used By</h3>",
        `<p>${escapeHtml(summary.used_by || "Not specified.")}</p>`,
        "<h3>Change Risk</h3>",
        `<p>${escapeHtml(summary.change_risk || "unknown")}</p>`,
        "<h3>Open Questions</h3>",
        `<p>${escapeHtml(summary.open_questions || "None recorded.")}</p>`,
        "<h3>Confidence</h3>",
        `<p>${escapeHtml(summary.confidence || "unknown")}</p>`,
        `<p>${edges.length} connected edge${edges.length === 1 ? "" : "s"} · ${outgoing.length} out · ${incoming.length} in</p>`,
      ].join("");
    }

    function renderStructure(graph) {
      const root = buildHierarchy(graph);
      root.each(item => measureNode(item.data));

      const layout = d3.tree()
        .nodeSize([120, 1])
        .separation((a, b) => {
          const width = Math.max(a.data.boxWidth, b.data.boxWidth);
          return (a.parent === b.parent ? 0.52 : 0.75) + width / 620;
        });
      layout(root);

      const descendants = root.descendants();
      const centerX = root.x;
      const horizontalCompression = 0.55;
      descendants.forEach(item => {
        item.data.x = centerX + (item.x - centerX) * horizontalCompression;
        item.data.flowStack = false;
      });
      compactHorizontalRows(root, descendants);
      applyLevelRows(descendants);
      stackChildren(root, root.data.x);
      annotateKindLabels(root);

      const minX = d3.min(descendants, item => item.data.x - item.data.boxWidth / 2) || 0;
      const minY = d3.min(descendants, item => item.data.y - item.data.boxHeight / 2) || 0;
      descendants.forEach(item => {
        item.data.x += 24 - minX;
        item.data.y += 24 - minY;
      });
      const bounds = graphBounds(descendants);

      const laidOutById = new Map(descendants.map(item => [item.data.id, item.data]));
      const visibleImports = (graph.edges || []).filter(edge => laidOutById.has(edge.source) && laidOutById.has(edge.target));
      const hierarchyEdges = root.links().map((edge, index) => ({
        id: `hierarchy-edge:${index}`,
        type: "hierarchy",
        source: edge.source.data.id,
        target: edge.target.data.id,
      }));
      currentDiagramEdges = [...hierarchyEdges, ...visibleImports];

      hierarchyEdgeLayer.selectAll("path")
        .data(root.links(), edge => `${edge.source.data.id}->${edge.target.data.id}`)
        .join("path")
        .attr("class", "edge hierarchy")
        .attr("d", edge => connector(edge.source.data, edge.target.data));

      importEdgeLayer.selectAll("path")
        .data(visibleImports, edge => edge.id)
        .join("path")
        .attr("class", "edge import")
        .attr("d", edge => flowConnector(laidOutById.get(edge.source), laidOutById.get(edge.target)));

      const node = nodeLayer.selectAll("g.node")
        .data(descendants, item => item.data.id)
        .join(enter => {
          const group = enter.append("g").attr("class", item => classes(item.data));
          group.append("rect").attr("rx", 8).attr("ry", 8);
          group.append("text").attr("class", "label kind-label");
          group.append("text").attr("class", "label name-label");
          return group;
        })
        .attr("class", item => classes(item.data))
        .attr("transform", item => `translate(${item.data.x - item.data.boxWidth / 2},${item.data.y - item.data.boxHeight / 2})`);

      node.select("rect")
        .attr("width", item => item.data.boxWidth)
        .attr("height", item => item.data.boxHeight);

      node.select("text.kind-label")
        .attr("x", item => item.data.boxWidth / 2)
        .attr("y", 16)
        .style("display", item => item.data.showKindLabel ? null : "none")
        .text(item => item.data.kindLabel);

      node.select("text.name-label")
        .attr("x", item => item.data.boxWidth / 2)
        .attr("y", item => item.data.showKindLabel ? item.data.boxHeight / 2 + 8 : item.data.boxHeight / 2)
        .each(function(item) {
          const text = d3.select(this);
          text.selectAll("tspan").remove();
          const lineHeight = 22;
          const start = -((item.data.labelLines.length - 1) * lineHeight) / 2;
          item.data.labelLines.forEach((line, index) => {
            text.append("tspan")
              .attr("x", item.data.boxWidth / 2)
              .attr("dy", index === 0 ? start : lineHeight)
              .text(line);
          });
        });

      node.on("click", (event, item) => {
        event.stopPropagation();
        selectNode(item.data, graph);
      });

      svg.on("click", () => selectNode(null, graph));

      zoomBehavior = d3.zoom()
        .scaleExtent([0.1, 8])
        .on("zoom", event => {
          viewport.attr("transform", event.transform);
        });
      svg.call(zoomBehavior);
      svg.call(zoomBehavior.transform, fitTransform(bounds));

      const files = nodeArray(graph).filter(item => item.type === "file").length;
      const symbols = nodeArray(graph).filter(item => ["function", "class", "interface", "struct", "type"].includes(item.type)).length;
      const unused = graph.analysis || {};
      meta.textContent = `${files} files · ${symbols} symbols · ${root.links().length} tree links · ${graph.scanner?.stale_files || 0} stale · ${unused.unused_files || 0} unused files · ${unused.unused_symbols || 0} unused symbols`;
    }

    function renderArchitecture(graph) {
      const { items, edges, refined } = buildArchitectureView(graph);
      layoutArchitectureItems(items);

      const bounds = graphBounds(items.map(data => ({ data })));
      const laidOutById = new Map(items.map(item => [item.id, item]));

      hierarchyEdgeLayer.selectAll("path")

        .attr("d", edge => flowConnector(laidOutById.get(edge.source), laidOutById.get(edge.target)));

      const node = nodeLayer.selectAll("g.node")
        .data(items.map(data => ({ data })), item => item.data.id)
        .join(enter => {

          group.append("rect").attr("rx", 8).attr("ry", 8);

      node.select("rect")

      node.select("text.kind-label")

        .attr("y", 16)

        .text(item => item.data.kindLabel);

      node.select("text.name-label")
        .attr("x", item => item.data.boxWidth / 2)
        .attr("y", item => item.data.boxHeight / 2 + 8)
        .each(function(item) {
          const text = d3.select(this);
          text.selectAll("tspan").remove();
          const lineHeight = 22;
          const start = -((item.data.labelLines.length - 1) * lineHeight) / 2;
          item.data.labelLines.forEach((line, index) => {
            text.append("tspan")

      node.on("click", (event, item) => {
        event.stopPropagation();

      svg.on("click", () => selectNode(null, graph));

      zoomBehavior = d3.zoom()
        .scaleExtent([0.1, 8])
        .on("zoom", event => {
          viewport.attr("transform", event.transform);
        });
      svg.call(zoomBehavior);
      svg.call(zoomBehavior.transform, fitTransform(bounds));

      const componentMode = refined || (graph.components || []).length > 0;
      meta.textContent = refined
        ? `${items.length} host-refined architecture components · ${edges.length} relationships`
        : componentMode
        ? `${items.length} architecture components · ${edges.length} component relationships · local-first candidates`
        : `${items.length} architecture modules · ${edges.length} dependency relationships · local-first analysis`;
    }

    function renderRuntimeFlow(graph) {
      const { items, edges, refined } = buildRuntimeFlow(graph);
      layoutRuntimeItems(items);

      const bounds = graphBounds(items.map(data => ({ data })));
      const laidOutById = new Map(items.map(item => [item.id, item]));
      currentDiagramEdges = edges;

      hierarchyEdgeLayer.selectAll("path")
        .data([])
        .join("path");

      importEdgeLayer.selectAll("path")
        .data(edges, edge => edge.id)
        .join("path")
        .attr("class", "edge import")
        .attr("d", edge => flowConnector(laidOutById.get(edge.source), laidOutById.get(edge.target)));

      const node = nodeLayer.selectAll("g.node")
        .data(items.map(data => ({ data })), item => item.data.id)
        .join(enter => {
          const group = enter.append("g").attr("class", item => classes(item.data));
          group.append("rect").attr("rx", 8).attr("ry", 8);
          group.append("text").attr("class", "label kind-label");
          group.append("text").attr("class", "label name-label");
          return group;
        })
        .attr("class", item => classes(item.data))
        .attr("transform", item => `translate(${item.data.x - item.data.boxWidth / 2},${item.data.y - item.data.boxHeight / 2})`);

      node.select("rect")
        .attr("width", item => item.data.boxWidth)
        .attr("height", item => item.data.boxHeight);

      node.select("text.kind-label")
        .attr("x", item => item.data.boxWidth / 2)
        .attr("y", 16)
        .style("display", null)
        .text(item => item.data.kindLabel);

      node.select("text.name-label")
        .attr("x", item => item.data.boxWidth / 2)
        .attr("y", item => item.data.boxHeight / 2 + 8)
        .each(function(item) {
          const text = d3.select(this);
          text.selectAll("tspan").remove();
          const lineHeight = 22;
          const start = -((item.data.labelLines.length - 1) * lineHeight) / 2;
          item.data.labelLines.forEach((line, index) => {
            text.append("tspan")
              .attr("x", item.data.boxWidth / 2)
              .attr("dy", index === 0 ? start : lineHeight)
              .text(line);
          });
        });

      node.on("click", (event, item) => {
        event.stopPropagation();
        selectNode(item.data, graph);
      });

      svg.on("click", () => selectNode(null, graph));

      zoomBehavior = d3.zoom()
        .scaleExtent([0.1, 8])
        .on("zoom", event => {
          viewport.attr("transform", event.transform);
        });
      svg.call(zoomBehavior);
      svg.call(zoomBehavior.transform, fitTransform(bounds));

      meta.textContent = refined
        ? `${items.length} host-refined runtime steps · ${edges.length} flow relationships`
        : `${items.length} runtime modules · ${edges.length} static import-flow edges`;
    }

    function render(graph) {
      const rootNode = graph.nodes?.[graph.root];
      repoName.textContent = rootNode?.name ? `Repo: ${rootNode.name}` : "Repo: unknown";
      if (currentView === "architecture") {
        renderArchitecture(graph);
        return;
      }
      if (currentView === "runtime") {
        renderRuntimeFlow(graph);
        return;
      }
      renderStructure(graph);
    }

    function setViewMode(mode) {
      currentView = mode;
      document.body.dataset.view = mode;
      modeButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.view === mode);
      });
      if (currentGraph) {
        selectedNodeId = null;
        selectNode(null, currentGraph);
        render(currentGraph);
      }
    }

    function classes(node) {
      const base = ["node", node.type];
      if (node.stale) base.push("stale");
      if (node.unused) base.push("unused");
      return base.join(" ");
    }

    function selectNode(selected, graph) {
      if (selected && selectedNodeId === selected.id) {
        selected = null;
      }
      selectedNodeId = selected ? selected.id : null;
      const relatedIds = new Set();
      if (selected) {
        for (const edge of currentDiagramEdges) {
          if (edge.source === selected.id || edge.target === selected.id) {
            relatedIds.add(edge.source);
            relatedIds.add(edge.target);
          }
        }
        updateDetails(selected, graph);
        refreshSummaries().then(refreshed => {
          if (refreshed && selectedNodeId === selected.id) {
            updateDetails(selected, graph);
          }
        });
      } else {
        details.classList.remove("open");
        details.innerHTML = "";
      }

      nodeLayer.selectAll("g.node")
        .classed("selected", item => selected && item.data.id === selected.id)
        .classed("connected", item => selected && relatedIds.has(item.data.id) && item.data.id !== selected.id);

      importEdgeLayer.selectAll("path.edge")
        .classed("active", edge => selected && (edge.source === selected.id || edge.target === selected.id));
      hierarchyEdgeLayer.selectAll("path.edge")
        .classed("active", edge => selected && (edge.source.data.id === selected.id || edge.target.data.id === selected.id));
    }

    modeButtons.forEach(button => {
      button.addEventListener("click", () => setViewMode(button.dataset.view));
    });

    function summaryIndexUrl() {
      return window.__AKSI_ARCHITECTURE__ ? "context/index.json" : "../Files/context/index.json";
    }

    function modelsUrl() {
      return window.__AKSI_ARCHITECTURE__ ? "context/models.json" : "../Files/context/models.json";
    }

    async function refreshSummaries() {
      if (window.location.protocol === "file:" && window.__AKSI_SUMMARIES__) {
        summaryIndex = window.__AKSI_SUMMARIES__.summaries || {};
        return true;
      }
      try {
        const response = await fetch(summaryIndexUrl(), { cache: "no-store" });
        if (!response.ok) return false;
        const payload = await response.json();
        summaryIndex = payload?.summaries || {};
        return true;
      } catch (_error) {
        return false;
      }
    }

    async function refreshModels() {
      if (window.location.protocol === "file:" && window.__AKSI_MODELS__) {
        refinedModels = window.__AKSI_MODELS__.models || {};
        return true;
      }
      try {
        const response = await fetch(modelsUrl(), { cache: "no-store" });
        if (!response.ok) return false;
        const payload = await response.json();
        refinedModels = payload?.models || {};
        return true;
      } catch (_error) {
        return false;
      }
    }

    function boot(graph, summaries = {}, models = {}) {
      assertValidGraph(graph);
      summaryIndex = summaries?.summaries || {};
      refinedModels = models?.models || {};
      currentGraph = graph;
      render(graph);
      refreshSummaries();
      refreshModels().then(refreshed => {
        if (refreshed && currentGraph) render(currentGraph);
      });
    }

    if (window.__AKSI_ARCHITECTURE__) {
      boot(window.__AKSI_ARCHITECTURE__, window.__AKSI_SUMMARIES__ || {}, window.__AKSI_MODELS__ || {});
    } else {
      fetch("../Files/architecture.json", { cache: "no-store" })
        .then(async response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const graph = await response.json();
          let summariesPayload = {};
          let modelsPayload = {};
          try {
            const summaries = await fetch("../Files/context/index.json", { cache: "no-store" });
            if (summaries.ok) {
              summariesPayload = await summaries.json();
            }
          } catch (_error) {
            summariesPayload = {};
          }
          try {
            const models = await fetch("../Files/context/models.json", { cache: "no-store" });
            if (models.ok) {
              modelsPayload = await models.json();
            }
          } catch (_error) {
            modelsPayload = {};
          }
          return { graph, summariesPayload, modelsPayload };
        })
        .then(({ graph, summariesPayload, modelsPayload }) => {
          boot(graph, summariesPayload, modelsPayload);
        })
        .catch(error => {
          meta.textContent = "Could not load ../Files/architecture.json";
          details.classList.add("open");
          details.innerHTML = `<h2>Map unavailable</h2><p>${escapeHtml(error.message)}</p>`;
        });
    }

    window.addEventListener("resize", () => {
      if (currentGraph) render(currentGraph);
    });
  </script>
</body>
</html>
